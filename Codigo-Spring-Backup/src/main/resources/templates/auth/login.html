<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login — Sistema de Aluguel de Carros</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div class="login-wrapper">
    <div class="login-card">
        <div class="login-logo">
            <div class="logo-icon">🚗</div>
            <h1>Aluguel de Carros</h1>
            <p>PUC Minas — Laboratório de Desenvolvimento de Software</p>
        </div>

        <!-- Mensagens de feedback -->
        <div th:if="${mensagem}" class="alert alert-success" th:text="${mensagem}"></div>
        <div th:if="${erro}" class="alert alert-danger" th:text="${erro}"></div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label for="username">E-mail <span class="required">*</span></label>
                <input type="email" id="username" name="username"
                       class="form-control" placeholder="seu@email.com" required/>
            </div>

            <div class="form-group">
                <label for="password">Senha <span class="required">*</span></label>
                <input type="password" id="password" name="password"
                       class="form-control" placeholder="••••••••" required/>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 0.5rem;">
                Entrar no Sistema
            </button>
        </form>

        <div class="divider">— ou —</div>

        <div class="link-cadastro">
            Não tem cadastro?
            <a th:href="@{/cadastro}">Criar conta agora</a>
        </div>

        <div class="divider" style="margin-top: 1.5rem; font-size: 0.8rem;">
            💡 Teste: joao@email.com / 123456 &nbsp;|&nbsp; agente@banco.com / 123456
        </div>
    </div>
</div>
</body>
</html>
