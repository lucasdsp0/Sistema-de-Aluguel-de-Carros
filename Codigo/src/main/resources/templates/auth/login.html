<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Aluguel de Carros</title>
    <link rel="stylesheet" href="/static/css/shared.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-wrapper {
            display: flex;
            gap: 40px;
            width: 100%;
            max-width: 900px;
            align-items: center;
        }
        .car-section {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 400px;
        }
        .car-illustration {
            font-size: 120px;
            animation: float 3s ease-in-out infinite;
        }
        .car-details {
            color: white;
            text-align: center;
            margin-top: 24px;
            font-size: 16px;
            font-weight: 500;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
            line-height: 1.6;
        }
        .login-container {
            background: white;
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-xl);
            padding: 40px;
            flex: 1;
            min-width: 350px;
            animation: slideInRight 0.5s ease-out;
        }
        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        .login-container h1 {
            color: var(--text-primary);
            margin-bottom: 8px;
            text-align: center;
        }
        .subtitle {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 24px;
            font-size: 14px;
        }
        .test-creds {
            background: #f0f4ff;
            padding: 12px;
            border-radius: var(--radius-md);
            margin-bottom: 20px;
            font-size: 12px;
            color: var(--primary);
            border-left: 4px solid var(--primary);
            line-height: 1.6;
        }
        .test-creds strong {
            color: var(--primary-dark);
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="car-section">
            <div>
                <div class="car-illustration">🚗</div>
                <div class="car-details">
                    Locação de Carros<br>
                    <span style="font-size: 13px; opacity: 0.9;">Rápido, Seguro e Confiável</span>
                </div>
            </div>
        </div>

        <div class="login-container">
            <h1>🔑 LOGIN</h1>
            <p class="subtitle">Bem-vindo de volta!</p>

            {#if mensagem}
            <div class="alert alert-success">{mensagem}</div>
            {/if}

            <div class="test-creds">
                <strong>📝 Credenciais de Teste:</strong><br>
                <strong>Cliente:</strong> joao@email.com / 123456<br>
                <strong>Agente:</strong> agente@banco.com / 123456
            </div>

            <form method="post" action="/auth/login">
                <div class="form-group">
                    <label for="email">📧 E-mail</label>
                    <input type="email" id="email" name="email" placeholder="seu@email.com" required>
                </div>
                <div class="form-group">
                    <label for="password">🔐 Senha</label>
                    <input type="password" id="password" name="password" placeholder="Digite sua senha" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">🚗 ENTRAR</button>
            </form>
        </div>
    </div>

    <script src="/static/js/toast.js"></script>
    <script>
        window.addEventListener('load', function() {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('error')) {
                toast.error('Erro ao fazer login. Verifique suas credenciais.', 5000);
            }
        });
    </script>
</body>
</html>
