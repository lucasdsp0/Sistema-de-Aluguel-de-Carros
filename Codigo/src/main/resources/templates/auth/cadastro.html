<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Sistema de Aluguel de Carros</title>
    <link rel="stylesheet" href="/static/css/shared.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .form-wrapper {
            width: 100%;
            max-width: 450px;
            animation: slideInUp 0.5s ease-out;
        }
        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .card-header h1 {
            font-size: 32px;
            margin-bottom: 4px;
        }
        .signup-link {
            text-align: center;
            margin-top: 20px;
            padding: 16px;
            border-top: 1px solid var(--border);
            font-size: 13px;
            color: var(--text-secondary);
        }
        .signup-link a {
            color: var(--primary);
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="form-wrapper">
        <div class="card">
            <div class="card-header">
                <h1>🚗 Cadastro</h1>
                <p style="color: white; margin: 4px 0 0 0; opacity: 0.9; font-size: 13px;">Crie sua conta para começar a alugar carros</p>
            </div>

            <div class="card-body">
                <form method="post" action="/auth/cadastro">
                    <div class="form-group">
                        <label for="nome">👤 Nome Completo</label>
                        <input type="text" id="nome" name="nome" placeholder="João Silva" required>
                    </div>
                    <div class="form-group">
                        <label for="email">📧 E-mail</label>
                        <input type="email" id="email" name="email" placeholder="seu@email.com" required>
                    </div>
                    <div class="form-group">
                        <label for="cpf">🆔 CPF</label>
                        <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" required>
                    </div>
                    <div class="form-group">
                        <label for="senha">🔐 Senha</label>
                        <input type="password" id="senha" name="senha" placeholder="Digite uma senha forte" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">🚗 CADASTRAR</button>
                </form>

                <div class="signup-link">
                    Já tem conta? <a href="/auth/login">Faça login</a><br>
                    <a href="/" style="font-weight: 400; color: var(--text-secondary);">← Voltar para Home</a>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/toast.js"></script>
</body>
</html>
