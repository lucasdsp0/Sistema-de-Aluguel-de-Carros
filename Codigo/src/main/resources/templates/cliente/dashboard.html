<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Cliente</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 30px 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            padding: 40px;
        }
        h1 { color: #333; margin-bottom: 30px; border-bottom: 3px solid #667eea; padding-bottom: 15px; }
        .welcome { color: #667eea; font-size: 18px; margin-bottom: 20px; }
        .stats { display: flex; gap: 20px; margin: 20px 0; flex-wrap: wrap; }
        .stat-box {
            flex: 1;
            min-width: 150px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        .stat-box h3 { font-size: 14px; margin-bottom: 10px; }
        .stat-box .number { font-size: 28px; font-weight: bold; }
        .nav-links {
            display: flex;
            gap: 10px;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        a {
            display: inline-block;
            padding: 10px 20px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s;
            font-weight: 500;
        }
        a:hover { background: #764ba2; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Dashboard do Cliente</h1>
        <p class="welcome">Bem-vindo ao seu painel de controle!</p>

        <div class="stats">
            <div class="stat-box">
                <h3>Total de Clientes</h3>
                <div class="number">{totalClientes}</div>
            </div>
        </div>

        <div class="nav-links">
            <a href="/cliente/listar">📋 Ver Clientes</a>
            <a href="/cliente/perfil">👤 Meu Perfil</a>
            <a href="/">🏠 Voltar</a>
        </div>
    </div>
</body>
</html>
