<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Novo Pedido de Aluguel</title>
    <link rel="stylesheet" href="/static/css/shared.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .form-wrapper {
            width: 100%;
            max-width: 500px;
            animation: slideInUp 0.5s ease-out;
        }
        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .info-box {
            background-color: #eff6ff;
            border: 1px solid #bfdbfe;
            border-left: 4px solid var(--info);
            border-radius: var(--radius-md);
            padding: 12px 14px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #1e40af;
            line-height: 1.5;
        }
        .info-box strong {
            color: #1e3a8a;
        }
    </style>
</head>
<body>
    <div class="form-wrapper">
        <div class="card">
            <div class="card-header">
                <h1>🚗 Criar Novo Pedido</h1>
                <p style="color: white; margin: 8px 0 0 0; opacity: 0.9; font-size: 13px;">Selecione um automóvel e as datas desejadas</p>
            </div>

            <div class="card-body">
                {#if erro}
                <div class="alert alert-danger">{erro}</div>
                {/if}

                <div class="info-box">
                    <strong>ℹ️ Como funciona:</strong> Preencha todos os campos para criar um novo pedido. O valor diário é baseado na tarifa do automóvel selecionado.
                </div>

                <form method="POST" action="/pedido/criar">
                    <div class="form-group">
                        <label for="automovel">🚗 Automóvel</label>
                        <select id="automovel" name="automovel_id" required>
                            <option value="">-- Selecione um automóvel --</option>
                            {#for auto in automovels}
                                <option value="{auto.id}">
                                    {auto.marca} {auto.modelo} ({auto.anoFabricacao}) - R$ {auto.valorDiarioPadrao}/dia
                                </option>
                            {/for}
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="data_inicio">📅 Data de Início</label>
                        <input type="date" id="data_inicio" name="data_inicio" required>
                    </div>

                    <div class="form-group">
                        <label for="data_fim">📅 Data de Fim</label>
                        <input type="date" id="data_fim" name="data_fim" required>
                    </div>

                    <div class="form-group">
                        <label for="valor_diario">💰 Valor Diário (R$)</label>
                        <input type="text" id="valor_diario" name="valor_diario" placeholder="Ex: 150.00" required>
                    </div>

                    <div class="flex" style="gap: 12px;">
                        <button type="button" class="btn btn-secondary" onclick="window.location.href='{#if tipoUsuario == "AGENTE"}/agente/dashboard{#else}/cliente/dashboard{/if}'">← Voltar</button>
                        <button type="submit" class="btn btn-primary">✓ Criar Pedido</button>
                    </div>
                </form>

                <script src="/static/js/toast.js"></script>
                <script>
                    // Set minimum date to today
                    const today = new Date().toISOString().split('T')[0];
                    document.getElementById('data_inicio').setAttribute('min', today);
                    document.getElementById('data_fim').setAttribute('min', today);

                    // Auto-fill valor_diario based on selected automovel
                    document.getElementById('automovel').addEventListener('change', function() {
                        const selectedOption = this.options[this.selectedIndex];
                        const text = selectedOption.text;
                        const match = text.match(/R\$\s([\d.,]+)\/dia/);
                        if (match) {
                            const valor = match[1].replace(',', '.');
                            document.getElementById('valor_diario').value = valor;
                        }
                    });

                    // Auto-fill based on auto URL param if present
                    const autoId = new URLSearchParams(window.location.search).get('auto');
                    if (autoId) {
                        document.getElementById('automovel').value = autoId;
                        const selectedOption = document.getElementById('automovel').options[document.getElementById('automovel').selectedIndex];
                        const text = selectedOption.text;
                        const match = text.match(/R\$\s([\d.,]+)\/dia/);
                        if (match) {
                            const valor = match[1].replace(',', '.');
                            document.getElementById('valor_diario').value = valor;
                        }
                    }
                </script>
            </div>
        </div>
    </div>
</body>
</html>
